<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Everest Poker Room | Member Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #021c12;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      background: #021c12;
    }

    .loading {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(34,197,94,.18), transparent 34%),
        linear-gradient(180deg, #021c12 0%, #010806 100%);
      color: #d8b74a;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 1;
    }

    .loading-card img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      display: block;
      margin: 0 auto 22px;
      border-radius: 10px;
      background: #030303;
    }

    .loading-card h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 5px;
      font-weight: 900;
    }

    .loading-card p {
      margin: 12px 0 0;
      color: rgba(255,255,255,.65);
      font-size: 14px;
      font-weight: 700;
    }

    iframe.loaded + .loading {
      display: none;
    }
  </style>
</head>

<body>
  <iframe
    id="memberFrame"
    src="https://script.google.com/macros/s/AKfycbyALYMa624HcSCtQmB1Oq5_g7LdNqQdXS_nUENb8D4U29gWB1SYHC-4mp5RzTjpTQZ2/exec"
    allow="clipboard-read; clipboard-write"
  ></iframe>

  <div class="loading">
    <div class="loading-card">
      <img src="logo.png" alt="Everest Poker Room">
      <h1>EVEREST MEMBER PORTAL</h1>
      <p>Loading member system...</p>
    </div>
  </div>

  <script>
    const frame = document.getElementById("memberFrame");

    frame.addEventListener("load", function () {
      frame.classList.add("loaded");
    });
  </script>
</body>
</html>
